name: passing variables in jobs

on:
  workflow_dispatch:
    inputs:
      environments:
        description: "deployment environment"
        required: true
        default: "dev"
      versions:
        description: "application version"
        required: false
        default: "1.0.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: workflow inputs
        run: |
          echo "env : ${{ inputs.environments }}"
          echo "version : ${{ inputs.versions }}"
